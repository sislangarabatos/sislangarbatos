<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de Emociones</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:white;
    font-family:Arial,sans-serif;
}

#wheel{
    width:600px;
    max-width:90vw;
    transition:transform 5s ease-out;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

.pointer{
    font-size:40px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="pointer">▼</div>

<img id="wheel" src="rueda1.png" alt="Ruleta">

<button onclick="spinWheel()">Girar</button>

<script>
let currentRotation = 0;
let spinning = false;

function spinWheel(){

    if(spinning) return;

    spinning = true;

    const randomAngle = Math.floor(Math.random() * 360);

    currentRotation += (360 * 5) + randomAngle;

    document.getElementById("wheel").style.transform =
        `rotate(${currentRotation}deg)`;

    setTimeout(()=>{
        spinning = false;
    },5000);
}
</script>

</body>
</html>
